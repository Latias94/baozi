topic: Baozi Rust model importer ecosystem and first parser vertical slice planning
date: 2026-07-09
time_range: "2024-01-01..2026-07-09"
items:
  - name: Assimp architecture reference
    category: reference_project
    focus: importer registry, IO abstraction, STL importer behavior, validation, postprocess, fixtures
  - name: Baozi workspace and ADRs
    category: local_architecture
    focus: crate graph, scene IR, AssetIo, format support tiers, parser safety, snapshot/cache boundary
  - name: stl_io
    category: rust_crate
    focus: STL parser/writer candidate and behavior oracle; MIT; current 0.11.0 as of crates.io API lookup
  - name: tobj
    category: rust_crate
    focus: OBJ parser candidate and future behavior oracle; MIT; current 4.0.4 as of crates.io API lookup
  - name: ply-rs
    category: rust_crate
    focus: PLY parser prior art; MIT; old 0.1.3 release as of crates.io API lookup
  - name: serde-ply
    category: rust_crate
    focus: newer PLY ecosystem signal; metadata lookup was partially unavailable and needs follow-up before dependency use
  - name: gltf
    category: rust_crate
    focus: glTF 2.0 loader candidate; MIT OR Apache-2.0; current 1.4.1 as of crates.io API lookup
  - name: winnow
    category: rust_crate
    focus: parser-combinator candidate for future text formats; MIT; alloc/std feature separation
  - name: binrw
    category: rust_crate
    focus: declarative binary parsing candidate; MIT; useful but macro-heavy for security review
  - name: nom
    category: rust_crate
    focus: mature parser-combinator candidate; MIT; alternative to winnow
  - name: image
    category: rust_crate
    focus: optional image decoding; MIT OR Apache-2.0; MSRV 1.88 on latest metadata, so not suitable for current MSRV 1.85 default
  - name: meshopt
    category: rust_crate
    focus: optional mesh optimization; MIT OR Apache-2.0; FFI/native risk means optional only
  - name: mikktspace
    category: rust_crate
    focus: optional tangent generation; older but relevant to glTF-style tangent basis
  - name: wasm32-unknown-unknown
    category: platform_target
    focus: browser-compatible bytes/memory import path without filesystem or native threading assumptions
  - name: wasm32-wasip1
    category: platform_target
    focus: WASI-oriented filesystem-capable variant for CLI/server runtimes
execution:
  batch_size: 3
  items_per_agent: 1
  output_dir: docs/research/baozi-rust-model-importer-ecosystem/results
notes:
  - Subagents were requested as read-only and no-spawn. One Assimp subagent violated the no-spawn constraint and was interrupted; main-thread research completed the required analysis.
  - Crate metadata was gathered from crates.io API. Direct repository/license audits are still required before adding any new default dependency.
