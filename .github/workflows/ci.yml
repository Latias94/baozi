name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_FUZZ_NIGHTLY: nightly-2026-05-27
  CARGO_FUZZ_VERSION: 0.13.2
  ACTIONLINT_VERSION: v1.7.12
  GO_VERSION: 1.26.x

jobs:
  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Check workflow syntax
        run: go run "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown, wasm32-wasip1

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace --all-targets

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo nextest run --workspace

      - name: Test documentation examples
        run: cargo test --doc --workspace --all-features

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps

      - name: Check no-default facade
        run: cargo check -p baozi --no-default-features

      - name: Check all format features
        run: cargo check -p baozi --features all-formats,native-fs

      - name: Check browser WASM bytes path
        run: cargo check -p baozi --target wasm32-unknown-unknown --no-default-features --features format-stl,format-obj

      - name: Check WASI native-fs path
        run: cargo check -p baozi --target wasm32-wasip1 --no-default-features --features format-stl,format-obj,native-fs

      - name: Check dependency policy
        run: cargo deny check

  fuzz:
    name: ${{ matrix.target }} sanitizer fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - stl_import
          - obj_import
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pinned nightly Rust
        # Dated nightly toolchains use the action's explicit toolchain input path.
        # See docs/contributing/fuzzing.md for why Linux CI is the sanitizer authority.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_FUZZ_NIGHTLY }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version "${CARGO_FUZZ_VERSION}" --locked

      - name: Check fuzz target
        run: cargo fuzz check "${{ matrix.target }}"

      - name: Run fuzz smoke
        run: cargo fuzz run "${{ matrix.target }}" -- -runs=256
